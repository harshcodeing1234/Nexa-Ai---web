<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Nexa AI</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
:root {
  --bg: #050810;
  --surface: #0d1117;
  --surface2: #161b22;
  --border: rgba(99,179,237,0.12);
  --accent: #63b3ed;
  --text: #e2e8f0;
  --muted: #718096;
  --danger: #fc8181;
  --success: #68d391;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
}
.logo {
  text-align: center;
  margin-bottom: 32px;
}
.logo-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, #63b3ed, #9f7aea);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  margin: 0 auto 12px;
}
h2 {
  color: var(--text);
  font-size: 24px;
  margin-bottom: 8px;
  text-align: center;
}
.subtitle {
  color: var(--muted);
  font-size: 14px;
  text-align: center;
  margin-bottom: 24px;
}
.form-group {
  margin-bottom: 16px;
}
label {
  display: block;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
}
input:focus {
  border-color: var(--accent);
}
.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #63b3ed, #9f7aea);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform .2s, opacity .2s;
}
.btn:hover {
  transform: translateY(-1px);
}
.btn:active {
  transform: translateY(0);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.message {
  margin-top: 16px;
  padding: 12px;
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
}
.success-msg {
  background: rgba(104, 211, 145, 0.1);
  color: var(--success);
  border: 1px solid rgba(104, 211, 145, 0.3);
}
.error-msg {
  background: rgba(252, 129, 129, 0.1);
  color: var(--danger);
  border: 1px solid rgba(252, 129, 129, 0.3);
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 20px;
  color: var(--accent);
  text-decoration: none;
  font-size: 14px;
}
.back-link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <div class="logo-icon">N</div>
  </div>
  <div class="card">
    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password</p>
    
    <div class="form-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Min 8 characters, uppercase, lowercase, number">
    </div>
    
    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter your password">
    </div>
    
    <button class="btn" onclick="resetPassword()">Reset Password</button>
    
    <div id="message"></div>
    
    <a href="/auth" class="back-link">← Back to Sign In</a>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const token = urlParams.get('token');

if (!token) {
  document.getElementById('message').className = 'message error-msg';
  document.getElementById('message').textContent = 'Invalid reset link';
  document.querySelector('.btn').disabled = true;
}

let csrfToken = '';

async function fetchCSRFToken() {
  try {
    const r = await fetch('/api/csrf-token');
    const d = await r.json();
    csrfToken = d.csrf_token;
  } catch(e) {
    console.error('Failed to fetch CSRF token:', e);
  }
}

fetchCSRFToken();

async function resetPassword() {
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const msg = document.getElementById('message');
  
  if (!password || !confirmPassword) {
    msg.className = 'message error-msg';
    msg.textContent = 'Please fill all fields';
    return;
  }
  
  if (password !== confirmPassword) {
    msg.className = 'message error-msg';
    msg.textContent = 'Passwords do not match';
    return;
  }
  
  try {
    const r = await fetch('/api/reset-password', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrfToken
      },
      body: JSON.stringify({ token, password })
    });
    
    const d = await r.json();
    
    if (d.success) {
      msg.className = 'message success-msg';
      msg.textContent = 'Password reset successful! Redirecting to login...';
      setTimeout(() => window.location.href = '/auth', 2000);
    } else {
      msg.className = 'message error-msg';
      msg.textContent = d.error;
    }
  } catch(e) {
    msg.className = 'message error-msg';
    msg.textContent = 'Network error. Please try again.';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') resetPassword();
});
</script>
</body>
</html>
