<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexa AI — Page Not Found</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #050810;
      --accent: #63b3ed;
      --accent2: #9f7aea;
      --text: #e2e8f0;
      --muted: #718096;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      overflow: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(99, 179, 237, 0.06) 0%, transparent 70%);
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .num {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(80px, 20vw, 160px);
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(20px, 4vw, 32px);
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 36px;
      max-width: 400px;
    }

    .btns {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a {
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn-home {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-back {
      border: 1px solid rgba(99, 179, 237, 0.2);
      color: var(--muted);
    }

    .btn-back:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .icon {
      font-size: 64px;
      margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-12px);
      }
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="content">
    <div class="icon">🔭</div>
    <div class="num">404</div>
    <h1>Page Not Found</h1>
    <p>This page drifted into the void. Let's navigate you back to familiar territory.</p>
    <div class="btns">
      <a class="btn-home" href="/">Go Home</a>
      <a class="btn-back" href="/chat">Open Chat</a>
    </div>
  </div>
</body>

</html>
