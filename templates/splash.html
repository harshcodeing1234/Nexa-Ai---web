<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa AI</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #050810 0%, #0d1117 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
}
.splash-container {
  text-align: center;
  animation: fadeIn 0.3s ease-in;
}
.splash-logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  font-weight: bold;
  color: #fff;
  margin: 0 auto 20px;
  box-shadow: 0 0 60px rgba(102, 126, 234, 0.4);
  animation: pulse 1.5s ease-in-out infinite;
}
.splash-text {
  font-size: 32px;
  font-weight: 800;
  background: linear-gradient(135deg, #63b3ed, #9f7aea);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}
.splash-tagline {
  color: #718096;
  font-size: 14px;
}
@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); box-shadow: 0 0 60px rgba(102, 126, 234, 0.4); }
  50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(102, 126, 234, 0.6); }
}
</style>
</head>
<body>
<div class="splash-container">
  <div class="splash-logo">N</div>
  <div class="splash-text">NEXA AI</div>
  <div class="splash-tagline">Intelligence Redefined</div>
</div>
<script>
setTimeout(() => {
  window.location.href = '/chat';
}, 500);
</script>
</body>
</html>
